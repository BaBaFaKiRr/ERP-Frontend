version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: erp-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-migrations
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres?sslmode=disable
    command: node run-all-migrations.js
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ../ERP-Backend
      dockerfile: Dockerfile
    container_name: erp-backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres?sslmode=disable
      - SUPABASE_URL=${SUPABASE_URL:-https://hixcjhqmoxqrbzsqujic.supabase.co}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - PORT=4000
    depends_on:
      migrations:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-https://hixcjhqmoxqrbzsqujic.supabase.co}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_ERP_API_URL=http://localhost:4000
    depends_on:
      - backend

volumes:
  pgdata:
